name: cork_board_notes
description: "تطبيق ملاحظات لاصقة بتصميم لوحة الفلين"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive: 2.2.3
  hive_flutter: 1.1.0
  shared_preferences: 2.5.3
  provider: 6.1.5+1
  intl: ^0.20.2
  uuid: ^4.5.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
